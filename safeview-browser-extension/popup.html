<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeView Controls</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
  </head>
  <body class="bg-gray-100">
    <main class="w-96 p-4 text-gray-900">
      <h1 class="text-lg font-bold mb-1">SafeView Controls</h1>
      <p class="text-xs text-gray-600 mb-4">Category toggles and sensitivity are synced across Chrome.</p>

      <section class="space-y-3">
        <label class="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm">
          <span class="text-sm font-medium">Nudity &amp; Explicit Content</span>
          <input id="category-nudity" type="checkbox" class="h-5 w-5" />
        </label>

        <label class="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm">
          <span class="text-sm font-medium">Violence &amp; Weapons</span>
          <input id="category-violence" type="checkbox" class="h-5 w-5" />
        </label>

        <label class="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm">
          <span class="text-sm font-medium">LGBTQ+ Content &amp; Symbols</span>
          <input id="category-lgbtq" type="checkbox" class="h-5 w-5" />
        </label>

        <label class="flex items-center justify-between bg-white p-3 rounded-lg shadow-sm">
          <span class="text-sm font-medium">Kissing &amp; Intimate Affection</span>
          <input id="category-kiss" type="checkbox" class="h-5 w-5" />
        </label>
      </section>

      <section class="mt-4 bg-white p-3 rounded-lg shadow-sm">
        <div class="flex items-center justify-between mb-2">
          <label for="sensitivity-level" class="text-sm font-medium">Sensitivity Level</label>
          <span id="sensitivity-value" class="text-sm font-semibold text-indigo-600">7</span>
        </div>
        <input
          id="sensitivity-level"
          type="range"
          min="1"
          max="10"
          step="1"
          class="w-full"
        />
      </section>

      <p class="text-xs text-gray-500 mt-3">Changes are auto-saved to sync storage.</p>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
